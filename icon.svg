<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Фиолетовый градиентный фон -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  <!-- Стеклянный блик -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#glass)" />
  
  <!-- Треугольник Play (центрированный, с закруглёнными углами) -->
  <path d="M176 136 L416 256 L176 376 Z" 
        fill="white" 
        fill-opacity="0.95" 
        stroke="white" 
        stroke-width="30" 
        stroke-linejoin="round" 
        stroke-linecap="round" />
  
  <!-- Маленький блик на треугольнике для объёма -->
  <circle cx="250" cy="220" r="20" fill="white" fill-opacity="0.4" />

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4a3aff"/>
      <stop offset="1" stop-color="#7a6aff"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="white" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.1"/>
      <stop offset="1" stop-color="white" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
